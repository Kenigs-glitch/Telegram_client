services:
  telegram:
    build:
      context: .
    image: telegram-multiacc:latest
    container_name: telegram-multiacc
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_PORT=${PROXY_PORT:-}
      - PROXY_USER=${PROXY_USER:-}
      - PROXY_PASS=${PROXY_PASS:-}
      - PROXY_TYPE=${PROXY_TYPE:-socks5}
    volumes:
      - ${TDATA_HOST}:/opt/Telegram/TelegramForcePortable/tdata
      - ${SHARED_HOST}:${SHARED_HOST}
      - ${DOWNLOADS_HOST}:/root/Downloads
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    devices:
      - /dev/snd
    group_add:
      - audio
    ipc: host
    # NET_ADMIN + NET_RAW for iptables (redsocks transparent proxy)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    restart: "no"
